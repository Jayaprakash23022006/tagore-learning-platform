<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Tagore Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .welcome-container {
            text-align: center;
            animation: fadeInScale 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .welcome-title {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-subtitle {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            animation: fadeIn 1s ease 0.5s both;
        }

        .loading-dots {
            display: inline-flex;
            gap: 0.5rem;
            animation: fadeIn 1s ease 1s both;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="bg-shape shape-1" style="width: 600px; height: 600px;"></div>
    <div class="bg-shape shape-2"></div>

    <div class="welcome-container">
        <h1 class="welcome-title">Welcome</h1>
        <p class="welcome-subtitle">Preparing your specialized learning environment...</p>
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const targetPortal = localStorage.getItem('targetPortal') || 'index.html';

            // Check if Visually Impaired portal is the target to trigger speech
            if (targetPortal === 'vi.html' && 'speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance("Welcome to Tagore Learning Platform.");
                msg.onend = () => {
                    setTimeout(() => {
                        window.location.href = targetPortal;
                    }, 500);
                };
                window.speechSynthesis.speak(msg);
            } else {
                // For other portals, redirect after 2.5 seconds Delay
                setTimeout(() => {
                    window.location.href = targetPortal;
                }, 2500);
            }
        });
    </script>
</body>

</html>
